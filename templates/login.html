<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>스마트 영농관리 | 로그인</title>
<meta name="theme-color" content="#2e7d32">
<link rel="manifest" href="/manifest.json">
<link rel="apple-touch-icon" href="/static/icons/icon-192.png">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-body">
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">
        <i data-lucide="sprout" class="logo-icon"></i>
        <h1>스마트 영농관리</h1>
        <p>언제 어디서나 편리한 농장 관리</p>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" data-tab="login">로그인</button>
        <button class="auth-tab" data-tab="register">회원가입</button>
      </div>

      <form id="loginForm" class="auth-form">
        <div class="form-group">
          <label>이메일</label>
          <input type="email" id="loginEmail" placeholder="example@farm.com" required>
        </div>
        <div class="form-group">
          <label>비밀번호</label>
          <input type="password" id="loginPassword" placeholder="비밀번호 입력" required>
        </div>
        <div id="loginError" class="form-error"></div>
        <button type="submit" class="btn btn-primary btn-block">로그인</button>
        <div class="auth-links">
          <a href="#" id="showFindIdBtn">아이디 찾기</a>
          <span>|</span>
          <a href="#" id="showFindPwBtn">비밀번호 찾기</a>
        </div>
      </form>

      <form id="findIdForm" class="auth-form hidden">
        <p class="auth-form-desc">가입 시 등록한 이름과 연락처를 입력해주세요.</p>
        <div class="form-group">
          <label>이름</label>
          <input type="text" id="findIdName" placeholder="홍길동" required>
        </div>
        <div class="form-group">
          <label>연락처</label>
          <input type="text" id="findIdPhone" placeholder="010-0000-0000" required>
        </div>
        <div id="findIdError" class="form-error"></div>
        <div id="findIdResult" class="form-success hidden"></div>
        <button type="submit" class="btn btn-primary btn-block">아이디 찾기</button>
        <button type="button" class="btn btn-outline btn-block auth-back-btn" data-back="login">로그인으로 돌아가기</button>
      </form>

      <form id="findPwForm" class="auth-form hidden">
        <p class="auth-form-desc">가입 시 등록한 정보와 새 비밀번호를 입력해주세요.</p>
        <div class="form-group">
          <label>이름</label>
          <input type="text" id="findPwName" placeholder="홍길동" required>
        </div>
        <div class="form-group">
          <label>이메일</label>
          <input type="email" id="findPwEmail" placeholder="example@farm.com" required>
        </div>
        <div class="form-group">
          <label>연락처</label>
          <input type="text" id="findPwPhone" placeholder="010-0000-0000" required>
        </div>
        <div class="form-group">
          <label>새 비밀번호</label>
          <input type="password" id="findPwNewPassword" placeholder="6자 이상" required>
        </div>
        <div id="findPwError" class="form-error"></div>
        <div id="findPwResult" class="form-success hidden"></div>
        <button type="submit" class="btn btn-primary btn-block">비밀번호 재설정</button>
        <button type="button" class="btn btn-outline btn-block auth-back-btn" data-back="login">로그인으로 돌아가기</button>
      </form>

      <form id="registerForm" class="auth-form hidden">
        <div class="form-group">
          <label>이름</label>
          <input type="text" id="regName" placeholder="홍길동" required>
        </div>
        <div class="form-group">
          <label>이메일</label>
          <input type="email" id="regEmail" placeholder="example@farm.com" required>
        </div>
        <div class="form-group">
          <label>비밀번호</label>
          <input type="password" id="regPassword" placeholder="6자 이상" required>
        </div>
        <div class="form-group">
          <label>연락처</label>
          <input type="text" id="regPhone" placeholder="010-0000-0000">
        </div>
        <div class="form-group">
          <label>농장명</label>
          <input type="text" id="regFarmName" placeholder="예) 행복한 농장">
        </div>
        <div class="form-group">
          <label>지역</label>
          <input type="text" id="regRegion" placeholder="예) 전라남도 나주시">
        </div>
        <div id="registerError" class="form-error"></div>
        <button type="submit" class="btn btn-primary btn-block">회원가입</button>
      </form>
    </div>
  </div>

<script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
